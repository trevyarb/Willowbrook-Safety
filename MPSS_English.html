  frame.style.display = 'none';
  document.getElementById('fallback').style.display = 'flex';
};
setTimeout(function() {
  try {
    if (!frame.contentDocument && !frame.contentWindow) {
      frame.style.display = 'none';
      document.getElementById('fallback').style.display = 'flex';
    }
  } catch(e) {}
}, 2000);
</script>
</body>
</html>
